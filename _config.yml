# Jekyll configuration for Company GitHub Pages
title: "Your Company"
description: "Company presentation - Activities A & B"

# GitHub Pages URL: empty = site at domain root (user/org page). Use e.g. "/repo-name" for project pages.
baseurl: ""

# Canonical site URL. Keep GitHub Pages URL until custom domain (e.g. lauji.fr) forwarding is configured.
url: "https://lauji-source.github.io/"

# Build settings
markdown: kramdown
permalink: pretty
highlighter: rouge

# Multilingual: supported locales
languages: ["en", "fr", "zh", "es"]
default_lang: "en"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
